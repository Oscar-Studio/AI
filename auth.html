<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>登录 / 注册 — Oscar Studio</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <a class="auth-back" href="index.html">← 返回 AI Studio</a>

    <main class="auth-page">
        <div class="auth-card">
            <header class="auth-brand">
                <img src="logo.png" alt="Oscar Studio" class="auth-logo">
                <span class="eyebrow-mono">OSCAR STUDIO</span>
            </header>

            <h1 class="auth-headline" id="authHeadline">Welcome back.</h1>

            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" type="button" role="tab" data-tab="login">登录</button>
                <button class="auth-tab" type="button" role="tab" data-tab="register">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="login-form" class="auth-form active" novalidate>
                <div class="form-field">
                    <label class="field-label" for="login-account">用户名 / 邮箱</label>
                    <input class="field-input" type="text" id="login-account" placeholder="输入用户名或邮箱" autocomplete="username" required>
                </div>
                <div class="form-field">
                    <label class="field-label" for="login-password">密码</label>
                    <input class="field-input" type="password" id="login-password" placeholder="输入密码" autocomplete="current-password" required>
                </div>
                <div class="form-error" id="login-error"></div>
                <button type="submit" class="primary-btn submit-btn">登录</button>
            </form>

            <!-- 注册表单 -->
            <form id="register-form" class="auth-form" novalidate>
                <div class="form-field">
                    <label class="field-label" for="reg-email">邮箱</label>
                    <input class="field-input" type="email" id="reg-email" placeholder="your@email.com" autocomplete="email" required>
                </div>
                <div class="form-field">
                    <label class="field-label" for="reg-username">用户名</label>
                    <input class="field-input" type="text" id="reg-username" placeholder="3–50 字符" minlength="3" maxlength="50" autocomplete="username" required>
                </div>
                <div class="form-field">
                    <label class="field-label" for="reg-password">密码</label>
                    <input class="field-input" type="password" id="reg-password" placeholder="至少 6 位" minlength="6" autocomplete="new-password" required>
                </div>
                <div class="form-field">
                    <label class="field-label" for="reg-code">验证码</label>
                    <div class="code-row">
                        <input class="field-input" type="text" id="reg-code" placeholder="6 位数字" maxlength="6" inputmode="numeric" pattern="\d{6}" required>
                        <button type="button" class="ghost-btn" id="reg-send-btn">发送验证码</button>
                    </div>
                    <div class="countdown-tip" id="reg-countdown"></div>
                </div>
                <div class="form-error" id="reg-error"></div>
                <button type="submit" class="primary-btn submit-btn">注册</button>
            </form>
        </div>

        <p class="auth-footer">
            <span class="footer-eyebrow">OSCAR STUDIO</span>
            AI tools &amp; voice
        </p>
    </main>

    <script src="auth.js"></script>
</body>
</html>
