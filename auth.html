<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册 - Oscar Studio</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div id="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎯 Oscar Studio</h1>
                <p>AI 助手平台</p>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">邮箱</label>
                    <input type="email" id="login-email" placeholder="your@email.com" required>
                </div>

                <div class="form-group" id="login-code-group">
                    <label for="login-code">验证码</label>
                    <div class="code-input-row">
                        <input type="text" id="login-code" placeholder="6位数字" maxlength="6" inputmode="numeric" pattern="\d{6}">
                        <button type="button" class="send-code-btn" id="login-send-btn">发送验证码</button>
                    </div>
                    <div class="countdown-tip" id="login-countdown" style="display:none;"></div>
                </div>

                <div class="form-error" id="login-error"></div>

                <button type="submit" class="submit-btn">登录</button>
            </form>

            <!-- 注册表单 -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="reg-email">邮箱</label>
                    <input type="email" id="reg-email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="reg-username">用户名</label>
                    <input type="text" id="reg-username" placeholder="3-50字符" minlength="3" maxlength="50" required>
                </div>

                <div class="form-group">
                    <label for="reg-code">验证码</label>
                    <div class="code-input-row">
                        <input type="text" id="reg-code" placeholder="6位数字" maxlength="6" inputmode="numeric" pattern="\d{6}">
                        <button type="button" class="send-code-btn" id="reg-send-btn">发送验证码</button>
                    </div>
                    <div class="countdown-tip" id="reg-countdown" style="display:none;"></div>
                </div>

                <div class="form-error" id="reg-error"></div>

                <button type="submit" class="submit-btn">注册</button>
            </form>

            <div class="back-link">
                <a href="AI_Launcher/index.html">← 返回 AI Launcher</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
