<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="d6ee6da5-3779-4551-a754-7f63fdf95dbb"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Launcher</title>
    <style>
        :root {
            --primary: #2A5CAA;
            --primary-hover: #1a4a9a;
            --accent: #00E5FF;
            --accent-dim: rgba(0, 229, 255, 0.12);
            --bg: #010409;
            --surface: #0d1117;
            --surface-2: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --user-msg: #1f6feb;
            --thinking-color: #6A00FF;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* ===== LAYOUT - full width ===== */
        #app {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background: var(--surface);
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            height: 56px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-brand h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-stats {
            display: flex;
            gap: 14px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-right: 8px;
        }

        .header-stats strong { color: var(--accent); }

        /* ===== SELECTS ===== */
        select {
            background: var(--surface-2);
            color: var(--text);
            border: none;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 0.82rem;
            outline: none;
            cursor: pointer;
            transition: background 0.15s;
        }

        select:hover { background: rgba(255,255,255,0.08); }
        select:focus { background: rgba(255,255,255,0.08); }

        select option { background: var(--surface-2); }

        .new-chat-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            border-color: var(--text-secondary);
            color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        /* ===== CHAT AREA ===== */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar { width: 6px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ===== MESSAGE ===== */
        .msg {
            display: flex;
            gap: 12px;
            max-width: 78%;
            animation: msgIn 0.2s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.ai { align-self: flex-start; }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 2px;
        }

        .msg.user .msg-avatar { background: var(--primary); color: white; }
        .msg.ai .msg-avatar { background: var(--surface-2); border: 1px solid var(--border); color: var(--accent); }

        .msg-body { display: flex; flex-direction: column; gap: 4px; }
        .msg.user .msg-body { align-items: flex-end; }
        .msg.ai .msg-body { align-items: flex-start; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: var(--radius);
            line-height: 1.65;
            font-size: 0.9rem;
            word-break: break-word;
        }

        .msg.user .msg-bubble {
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg.ai .msg-bubble {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        /* Thinking block */
        .reasoning-block {
            display: none;
            width: 100%;
            margin-bottom: 6px;
            padding: 8px 12px;
            background: rgba(106, 0, 255, 0.08);
            border-left: 3px solid var(--thinking-color);
            border-radius: 0 6px 6px 0;
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-style: italic;
            line-height: 1.6;
            max-height: 180px;
            overflow-y: auto;
        }

        .reasoning-block::-webkit-scrollbar { width: 4px; }
        .reasoning-block::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .msg-bubble .content { white-space: pre-wrap; }
        .msg-bubble .content.typing::after { content: '...'; animation: typing 1s infinite; }

        @keyframes typing {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        /* ===== MARKDOWN ===== */
        .msg-bubble .content p { margin: 5px 0; }
        .msg-bubble .content p:first-child { margin-top: 0; }
        .msg-bubble .content code {
            background: rgba(255,255,255,0.1);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 0.88em;
        }
        .msg-bubble .content pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .msg-bubble .content pre code { background: none; padding: 0; }
        .msg-bubble .content blockquote {
            border-left: 3px solid var(--thinking-color);
            margin: 8px 0; padding-left: 12px;
            color: var(--text-secondary);
        }
        .msg-bubble .content a { color: var(--accent); }
        .msg-bubble .content ul, .msg-bubble .content ol { padding-left: 20px; margin: 5px 0; }
        .msg-bubble .content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .msg-bubble .content th, .msg-bubble .content td { border: 1px solid var(--border); padding: 6px 10px; }
        .msg-bubble .content th { background: rgba(255,255,255,0.05); }
        .msg-bubble .content h1, .msg-bubble .content h2, .msg-bubble .content h3,
        .msg-bubble .content h4 { color: var(--accent); margin: 10px 0 6px; }
        .msg-bubble .content img { max-width: 100%; border-radius: 6px; }

        /* ===== WELCOME ===== */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 14px;
            color: var(--text-secondary);
        }

        #welcome h2 { font-size: 1.5rem; color: var(--accent); font-weight: 700; }
        #welcome p { font-size: 0.9rem; }

        /* ===== INPUT PANEL ===== */
        .input-panel {
            border-top: 1px solid var(--border);
            background: var(--surface-2);
            padding: 14px 1.5rem 16px;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            resize: none;
            height: 72px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            padding: 12px 14px;
            font-size: 0.9rem;
            font-family: inherit;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: var(--accent); }
        textarea::placeholder { color: var(--text-secondary); }

        .send-btn {
            width: 72px;
            height: 72px;
            border-radius: var(--radius);
            background: var(--primary);
            color: white;
            border: none;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) { background: var(--primary-hover); }
        .send-btn:disabled { background: var(--border); color: var(--text-secondary); cursor: not-allowed; }
        .send-btn.stop { background: var(--danger); }
        .send-btn.stop:hover { background: #b62324; }
        .send-btn svg { width: 18px; height: 18px; }

        /* Model bar below input */
        .model-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .model-bar label {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .think-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .think-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

        .think-btn:hover {
            border-color: var(--thinking-color);
            color: var(--text);
        }

        .think-btn.active {
            background: rgba(106, 0, 255, 0.15);
            border-color: var(--thinking-color);
            color: #c084fc;
        }

        .msg.error { align-self: center; }
        .msg.error .msg-bubble {
            background: rgba(218, 54, 51, 0.1);
            border-color: var(--danger);
            color: #ff7b72;
        }
    </style>

<body>

<div id="app">
    <header>
        <div class="header-brand">
            <h1>AI Launcher</h1>
            <select id="provider-select" style="font-size:0.88rem; padding:5px 10px;">
                <option value="deepseek">DeepSeek</option>
                <option value="minimax">MiniMax</option>
                <option value="mimo">MiMo</option>
            </select>
        </div>
        <div class="header-right">
            <div class="header-stats">
                <span>In: <strong id="stat-in">0</strong></span>
                <span>Out: <strong id="stat-out">0</strong></span>
                <span>Total: <strong id="stat-total">0</strong></span>
            </div>
            <button class="new-chat-btn" id="new-chat-btn">新对话</button>
        </div>
    </header>

    <div id="chat">
        <div id="welcome">
            <h2>AI Launcher</h2>
            <p>开始对话吧</p>
        </div>
    </div>

    <div class="input-panel">
        <div class="input-row">
            <textarea id="input-area" placeholder="输入消息，Shift+Enter 换行，Enter 发送..."></textarea>
            <button class="send-btn" id="send-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                </svg>
                <span id="send-label">发送</span>
            </button>
        </div>
        <div class="model-bar">
            <label for="model-select">模型：</label>
            <select id="model-select" style="font-size:0.9rem; padding:6px 10px;"></select>

            <button class="think-btn active" id="think-btn" style="font-size:0.88rem; padding:5px 14px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
                深度思考
            </button>
        </div>
        <p style="text-align:center;font-size:0.7rem;color:#30363d;padding:8px 0 0">
            <a href="https://beian.miit.gov.cn/" target="_blank" style="color:#30363d">粤ICP备2026012488号-1</a>
        </p>
    </div>
</div>

<script>
    // ==========================================
    // CONFIG
    // DeepSeek API: https://api-docs.deepseek.com/zh-cn/
    // MiniMax API: https://platform.minimaxi.com/docs/api-reference/
    // MiMo API: https://platform.xiaomimimo.com/docs/quick-start/first-api-call
    // ==========================================

    const MODEL_CONFIG = {
        deepseek: {
            models: [
                { id: 'deepseek-v4-flash', name: 'V4-flash' },
                { id: 'deepseek-v4-pro',   name: 'V4-Pro' }
            ]
        },
        minimax: {
            models: [
                { id: 'MiniMax-M2.7', name: 'M2.7' },
                { id: 'MiniMax-M2.5', name: 'M2.5' }
            ]
        },
        mimo: {
            models: [
                { id: 'mimo-v2-flash',  name: 'V2-flash' },
                { id: 'mimo-v2.5',      name: 'V2.5' },
                { id: 'mimo-v2.5-pro',  name: 'V2.5-Pro' }
            ]
        }
    };

    // ==========================================
    // STATE
    // ==========================================
    let provider = 'deepseek';
    let modelId  = 'deepseek-v4-flash';  // default: flash (cheaper)
    let thinking = true;   // deep think on by default (DeepSeek default = enabled)

    let abortCtrl    = null;
    let isGenerating = false;

    const chat        = document.getElementById('chat');
    const welcome      = document.getElementById('welcome');
    const inputArea    = document.getElementById('input-area');
    const sendBtn      = document.getElementById('send-btn');
    const sendLabel    = document.getElementById('send-label');
    const newChatBtn   = document.getElementById('new-chat-btn');
    const providerSel  = document.getElementById('provider-select');
    const modelSel     = document.getElementById('model-select');
    const thinkBtn     = document.getElementById('think-btn');
    const statIn       = document.getElementById('stat-in');
    const statOut      = document.getElementById('stat-out');
    const statTotal    = document.getElementById('stat-total');

    const history = [];

    // ==========================================
    // INIT
    // ==========================================
    document.getElementById('app').style.display = 'flex';
    thinkBtn.classList.add('active');  // thinking 默认开启
    buildModelList();
    applyThinkBtn();  // 首次根据默认模型决定按钮状态

    // ==========================================
    // MODEL LIST
    // ==========================================
    function buildModelList() {
        const cfg = MODEL_CONFIG[provider];
        modelSel.innerHTML = '';
        cfg.models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.name;
            modelSel.appendChild(opt);
        });
        modelId = modelSel.value;
    }

    // ==========================================
    // EVENTS
    // ==========================================
    providerSel.addEventListener('change', () => {
        provider = providerSel.value;
        thinking = true;
        buildModelList();
        applyThinkBtn();  // 根据模型决定按钮显示
    });

    modelSel.addEventListener('change', () => {
        modelId = modelSel.value;
        applyThinkBtn();  // 切换模型也要更新按钮
    });

    function applyThinkBtn() {
        // MiniMax：无法控制思考（reasoning_split 关不掉），按钮隐藏
        // MiMo Flash：模型不支持独立 reasoning_content，先隐藏
        const hideThink =
            provider === 'minimax' ||
            modelId === 'mimo-v2-flash';
        if (hideThink) {
            thinkBtn.style.display = 'none';
            thinking = true;
        } else {
            thinkBtn.style.display = '';
            thinkBtn.classList.toggle('active', thinking);
        }
    }

    thinkBtn.addEventListener('click', () => {
        thinking = !thinking;
        thinkBtn.classList.toggle('active', thinking);
    });

    inputArea.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });

    sendBtn.addEventListener('click', handleSend);

    newChatBtn.addEventListener('click', () => {
        if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
        history.length = 0;
        clearStats();
        chat.innerHTML = '';
        chat.appendChild(welcome);
        welcome.style.display = 'flex';
    });

    // ==========================================
    // SEND
    // ==========================================
    async function handleSend() {
        if (isGenerating) {
            abortCtrl.abort();
            return;
        }
        const text = inputArea.value.trim();
        if (!text) return;

        welcome.style.display = 'none';
        inputArea.value = '';
        appendMsg('user', text);
        history.push({ role: 'user', content: text });

        setLoading(true);

        const aiDiv = appendMsg('ai', '');
        const reasoningDiv = document.createElement('div');
        reasoningDiv.className = 'reasoning-block';
        aiDiv.querySelector('.msg-bubble').prepend(reasoningDiv);

        const contentDiv = aiDiv.querySelector('.content');
        contentDiv.classList.add('typing');

        abortCtrl = new AbortController();

        let fullResponse = '';
        let fullReasoning = '';
        const isMiniMax = provider === 'minimax';

        const body = {
            model: modelId,
            messages: history,
            stream: true
        };

        // DeepSeek：显式控制开关，thinking 放 extra_body
        if (provider === 'deepseek') {
            body.extra_body = {
                thinking: { type: thinking ? 'enabled' : 'disabled' }
            };
            if (thinking) {
                body.extra_body.reasoning_effort = 'high';
            }
        }

        // MiniMax：思考无法关闭，始终强制开启并分离显示
        if (isMiniMax) {
            body.reasoning_split = true;
        }

        // MiMo：thinking 参数控制思考内容
        if (provider === 'mimo') {
            body.extra_body = {
                thinking: { type: thinking ? 'enabled' : 'disabled' }
            };
        }

        try {
            const resp = await fetch('https://api.oscarstudio.cn/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                signal: abortCtrl.signal
            });

            if (!resp.ok) {
                const err = await resp.text();
                throw new Error(`API ${resp.status}: ${err}`);
            }

            contentDiv.classList.remove('typing');
            const reader = resp.body.getReader();
            const dec = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = dec.decode(value, { stream: true });
                for (const line of chunk.split('\n')) {
                    if (!line.startsWith('data: ')) continue;
                    const s = line.slice(6);
                    if (s === '[DONE]') break;

                    try {
                        const d = JSON.parse(s);

                        // MiniMax reasoning
                        if (isMiniMax && d.choices?.[0]?.delta) {
                            const delta = d.choices[0].delta;
                            if (delta.reasoning_details) {
                                for (const rd of delta.reasoning_details) {
                                    if (rd.text) fullReasoning += rd.text;
                                }
                                reasoningDiv.textContent = fullReasoning;
                                reasoningDiv.style.display = 'block';
                                scrollBottom();
                            }
                            if (delta.content) {
                                fullResponse += delta.content;
                                renderMd(contentDiv, fullResponse);
                                scrollBottom();
                            }
                        }
                        // DeepSeek reasoning — 仅在思考开启时显示
                        else if (provider === 'deepseek' && d.choices?.[0]?.delta?.reasoning_content && thinking) {
                            fullReasoning += d.choices[0].delta.reasoning_content;
                            reasoningDiv.textContent = fullReasoning;
                            reasoningDiv.style.display = 'block';
                            scrollBottom();
                        }

                        // Answer content
                        if (!isMiniMax && d.choices?.[0]?.delta?.content) {
                            fullResponse += d.choices[0].delta.content;
                            renderMd(contentDiv, fullResponse);
                            scrollBottom();
                        }

                        if (d.usage) updateStats(d.usage);
                    } catch (_) {}
                }
            }

            history.push({ role: 'assistant', content: fullResponse });
            renderMdFinal(contentDiv, fullResponse);

        } catch (err) {
            contentDiv.classList.remove('typing');
            if (err.name === 'AbortError') {
                contentDiv.textContent = (fullResponse || '') + '\n[已停止生成]';
                if (fullResponse) history.push({ role: 'assistant', content: fullResponse });
            } else {
                contentDiv.textContent = `[出错: ${err.message}]`;
            }
        } finally {
            setLoading(false);
            abortCtrl = null;
        }
    }

    // ==========================================
    // HELPERS
    // ==========================================
    function appendMsg(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = role === 'user' ? 'U' : 'A';

        const body = document.createElement('div');
        body.className = 'msg-body';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        if (role === 'ai') {
            const content = document.createElement('div');
            content.className = 'content';
            if (text) content.textContent = text;
            bubble.appendChild(content);
        } else {
            bubble.textContent = text;
        }

        body.appendChild(bubble);
        div.appendChild(avatar);
        div.appendChild(body);
        chat.appendChild(div);
        scrollBottom();
        return div;
    }

    function renderMd(el, text) {
        if (typeof marked !== 'undefined') {
            const r = marked.parse(text);
            if (r instanceof Promise) r.then(html => { el.innerHTML = html; });
            else el.innerHTML = r;
        } else {
            el.textContent = text;
        }
    }

    function renderMdFinal(el, text) {
        const r = typeof marked !== 'undefined' ? marked.parse(text) : text;
        if (r instanceof Promise) r.then(html => { el.innerHTML = html; });
        else el.innerHTML = r;
    }

    function scrollBottom() {
        chat.scrollTop = chat.scrollHeight;
    }

    function setLoading(on) {
        isGenerating = on;
        sendBtn.classList.toggle('stop', on);
        sendLabel.textContent = on ? '停止' : '发送';
        inputArea.disabled = false;
    }

    function updateStats(u) {
        if (!u) return;
        if (u.prompt_tokens !== undefined)       statIn.textContent = u.prompt_tokens;
        if (u.completion_tokens !== undefined)  statOut.textContent = u.completion_tokens;
        if (u.total_tokens !== undefined)        statTotal.textContent = u.total_tokens;
        if (u.input_tokens !== undefined)        statIn.textContent = u.input_tokens;
        if (u.output_tokens !== undefined)       statOut.textContent = u.output_tokens;
        if (u.total_tokens !== undefined)        statTotal.textContent = u.total_tokens;
    }

    function clearStats() {
        statIn.textContent = '0';
        statOut.textContent = '0';
        statTotal.textContent = '0';
    }
</script>
</body>
