<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="d6ee6da5-3779-4551-a754-7f63fdf95dbb"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Launcher</title>
    <style>
        :root {
            /* xAI / Grok design system */
            --primary: #ffffff;
            --on-primary: #0a0a0a;
            --ink: #ffffff;
            --ink-hover: #fafaf7;
            --body: #dadbdf;
            --body-mid: #7d8187;
            --mute: #7d8187;
            --hairline: #212327;
            --bg: #0a0a0a;
            --surface: #0a0a0a;
            --surface-2: #1a1c20;
            --surface-card: #191919;
            --border: #212327;
            --text: #ffffff;
            --text-secondary: #dadbdf;
            --user-msg: #0a0a0a;
            --thinking-color: #7c3aed;
            --accent-sunset: #ff7a17;
            --accent-dusk: #7c3aed;
            --accent-twilight: #c4b5fd;
            --radius: 8px;
            --radius-pill: 9999px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* ===== LAYOUT - full width ===== */
        #app {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background: var(--surface);
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            height: 56px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-brand h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: -0.3px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-stats {
            display: flex;
            gap: 14px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-right: 8px;
        }

        .header-stats strong { color: var(--accent-sunset); }

        /* ===== SELECTS ===== */
        select {
            background: var(--surface-2);
            color: var(--ink);
            border: 1px solid var(--hairline);
            padding: 5px 10px;
            border-radius: var(--radius-pill);
            font-size: 0.82rem;
            outline: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        select:hover { background: rgba(255,255,255,0.06); border-color: var(--body-mid); }
        select:focus { background: rgba(255,255,255,0.08); }
        select option { background: var(--surface-2); }

        .new-chat-btn {
            background: transparent;
            border: 1px solid var(--hairline);
            color: var(--ink);
            padding: 5px 14px;
            border-radius: var(--radius-pill);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            border-color: var(--ink-hover);
            color: var(--ink-hover);
            background: rgba(255,255,255,0.05);
        }

        /* ===== CHAT AREA ===== */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
            background: var(--bg);
        }

        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 2px; }

        /* ===== MESSAGE ===== */
        .msg {
            display: flex;
            gap: 12px;
            max-width: 78%;
            animation: msgIn 0.2s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.ai { align-self: flex-start; }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 2px;
        }

        .msg.user .msg-avatar { background: var(--primary); color: var(--on-primary); }
        .msg.ai .msg-avatar { background: transparent; border: 1px solid var(--hairline); color: var(--accent-sunset); }

        .msg-body { display: flex; flex-direction: column; gap: 4px; }
        .msg.user .msg-body { align-items: flex-end; }
        .msg.ai .msg-body { align-items: flex-start; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: var(--radius);
            line-height: 1.65;
            font-size: 0.9rem;
            word-break: break-word;
        }

        .msg.user .msg-bubble {
            background: var(--surface-2);
            color: var(--ink);
            border: 1px solid var(--hairline);
            border-bottom-right-radius: 4px;
        }

        .msg.ai .msg-bubble {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        /* Thinking block */
        .reasoning-block {
            display: none;
            width: 100%;
            margin-bottom: 6px;
            border-left: 3px solid var(--accent-dusk);
            border-radius: 0 6px 6px 0;
            background: rgba(124, 58, 237, 0.1);
            overflow: hidden;
        }

        .reasoning-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            cursor: pointer;
            user-select: none;
            color: var(--body-mid);
            font-size: 0.78rem;
            transition: background 0.15s;
        }

        .reasoning-header:hover { background: rgba(124, 58, 237, 0.15); }
        .reasoning-header .think-label { font-weight: 600; color: var(--accent-twilight); }
        .reasoning-header .think-time { margin-left: 4px; font-size: 0.72rem; opacity: 0.7; }
        .reasoning-header .think-arrow { margin-left: auto; transition: transform 0.2s; font-size: 0.65rem; opacity: 0.5; }
        .reasoning-header.expanded .think-arrow { transform: rotate(90deg); }

        .reasoning-body {
            padding: 0 12px 8px;
            color: var(--body-mid);
            font-size: 0.82rem;
            font-style: italic;
            line-height: 1.6;
            display: none;
        }

        .reasoning-block.expanded .reasoning-body { display: block; }

        .msg-bubble .content { white-space: pre-wrap; }
        .msg-bubble .content.typing::after { content: '...'; animation: typing 1s infinite; }

        @keyframes typing {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        /* ===== MARKDOWN ===== */
        .msg-bubble .content p { margin: 5px 0; }
        .msg-bubble .content p:first-child { margin-top: 0; }
        .msg-bubble .content code {
            background: rgba(255,255,255,0.1);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 0.88em;
        }
        .msg-bubble .content pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            overflow-x: auto;
            margin: 8px 0;
            position: relative;
        }
        .msg-bubble .content pre code { background: none; padding: 0; }
        .msg-bubble .content pre .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 3px 8px;
            font-size: 0.72rem;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }
        .msg-bubble .content pre:hover .copy-btn { opacity: 1; }
        .msg-bubble .content pre .copy-btn:hover { color: var(--text); }
.msg-bubble .content blockquote {
            border-left: 3px solid var(--accent-dusk);
            margin: 8px 0; padding-left: 12px;
.msg-bubble .content a { color: var(--accent-sunset); }
        .msg-bubble .content ul, .msg-bubble .content ol { padding-left: 20px; margin: 5px 0; }
        .msg-bubble .content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .msg-bubble .content th, .msg-bubble .content td { border: 1px solid var(--border); padding: 6px 10px; }
        .msg-bubble .content th { background: rgba(255,255,255,0.05); }
        .msg-bubble .content h1, .msg-bubble .content h2, .msg-bubble .content h3,
        .msg-bubble .content h4 { color: var(--accent-sunset); margin: 10px 0 6px; }
        .msg-bubble .content img { max-width: 100%; border-radius: var(--radius); }

        /* ===== WELCOME ===== */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 14px;
            color: var(--body-mid);
        }

        #welcome h2 { font-size: 1.2rem; color: var(--ink); font-weight: 600; letter-spacing: 0.5px; }
        #welcome p { font-size: 0.85rem; color: var(--body-mid); }

        /* ===== INPUT PANEL ===== */
        .input-panel {
            border-top: 1px solid var(--hairline);
            background: var(--surface);
            padding: 14px 1.5rem 16px;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            resize: none;
            height: 72px;
            background: var(--surface-2);
            border: 1px solid var(--hairline);
            border-radius: var(--radius);
            color: var(--ink);
            padding: 12px 14px;
            font-size: 0.9rem;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: var(--body-mid); }
        textarea::placeholder { color: var(--body-mid); }

        .attach-btn {
            width: 44px;
            height: 72px;
            border-radius: var(--radius);
            background: var(--surface-2);
            color: var(--body-mid);
            border: 1px solid var(--hairline);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
        }

        .attach-btn:hover { border-color: var(--ink-hover); color: var(--ink-hover); }
        .attach-btn svg { width: 20px; height: 20px; }
        .attach-btn .attach-count {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--accent-sunset);
            color: var(--on-primary);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        #file-input { display: none; }

        .send-btn {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-pill);
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) { background: var(--ink-hover); }
        .send-btn:disabled { background: var(--hairline); color: var(--body-mid); cursor: not-allowed; }
        .send-btn.stop { background: var(--accent-sunset); }
        .send-btn.stop:hover { background: #e06910; }
        .send-btn svg { width: 18px; height: 18px; }

        /* Model bar below input */
        .model-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .model-bar label {
            font-size: 0.78rem;
            color: var(--body-mid);
        }

        .think-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: var(--radius-pill);
            font-size: 0.78rem;
            font-weight: 500;
            border: 1px solid var(--hairline);
            background: transparent;
            color: var(--body-mid);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .think-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

        .think-btn:hover {
            border-color: var(--accent-dusk);
            color: var(--ink-hover);
        }

        .think-btn.active {
            background: rgba(124, 58, 237, 0.15);
            border-color: var(--accent-dusk);
            color: var(--accent-twilight);
        }

        .msg.error { align-self: center; }
        .msg.error .msg-bubble {
            background: rgba(218, 54, 51, 0.1);
            border-color: var(--danger);
            color: #ff7b72;
        }

        /* ===== MSG META (copy + token) ===== */
        .msg-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
            min-height: 20px;
        }
        .msg.user .msg-meta { justify-content: flex-end; }
        .msg.ai .msg-meta { justify-content: flex-start; }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 3px;
            transition: color 0.15s;
            opacity: 0;
        }
        .msg:hover .copy-btn,
        .copy-btn:focus { opacity: 1; }
        .copy-btn:hover { color: var(--text); }
        .copy-btn svg { width: 13px; height: 13px; }
        .copy-btn.copied { color: var(--accent); }

        /* Token info button */
        .token-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 3px;
            transition: color 0.15s;
            position: relative;
            opacity: 0;
        }
        .msg.ai:hover .token-btn { opacity: 1; }
        .token-btn:hover { color: var(--text); }
        .token-btn svg { width: 13px; height: 13px; }

        /* Token tooltip */
        .token-tip {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.72rem;
            color: var(--text-secondary);
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
        }
        .token-btn:hover .token-tip,
        .token-btn:focus .token-tip { display: block; }
        .token-tip span { color: var(--accent); }

        /* ===== QUOTA BADGE ===== */
        .premium-btn.unlocked {
            background: rgba(0, 229, 255, 0.1) !important;
            border-color: var(--accent) !important;
            color: var(--accent) !important;
        }

        /* ===== PREMIUM MODAL ===== */
        #premium-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #premium-modal-overlay.show { display: flex; }
        #premium-modal {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 32px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        #premium-modal h3 {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 6px;
        }
        #premium-modal p {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 18px;
            line-height: 1.5;
        }
        #premium-modal input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 9px 12px;
            font-size: 0.88rem;
            outline: none;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        #premium-modal input:focus { border-color: var(--accent); }
        #premium-modal-btns { display: flex; gap: 10px; }
        #premium-modal .modal-btn {
            flex: 1;
            padding: 9px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.15s;
        }
        #modal-cancel {
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        #modal-cancel:hover { background: rgba(255,255,255,0.06); }
        #modal-unlock {
            background: var(--primary);
            color: white;
        }
        #modal-unlock:hover { background: var(--primary-hover); }
        #modal-error { color: #ff7b72; font-size: 0.78rem; margin-top: 8px; min-height: 18px; }
    </style>

<body>

<div id="app">
    <header>
        <div class="header-brand">
            <h1>AI Launcher</h1>
            <select id="provider-select" style="font-size:0.88rem; padding:5px 10px;">
                <option value="deepseek">DeepSeek</option>
                <option value="minimax">MiniMax</option>
                <option value="mimo">MiMo</option>
                <option value="qwen">Qwen</option>
                <option value="zai">GLM</option>
                <option value="moonshot">Kimi</option>
                <option value="hy3">Tencent</option>
                <option value="free">🆓 Free</option>
            </select>
        </div>
        <div class="header-right">
            <div class="header-stats">
                <span>累计: <strong id="stat-total">0</strong> tokens</span>
                <span id="quota-badge" style="color:#ff7b72;font-size:0.72rem;display:none;">剩余 <strong id="quota-num">0</strong> credits</span>
            </div>
            <button class="new-chat-btn" id="new-chat-btn">新对话</button>

            <div id="userButtonContainer" style="margin-left:6px;"></div>
        </div>
    </header>

    <div id="chat">
        <div id="welcome">
            <h2>AI Launcher</h2>
            <p>开始对话吧</p>
        </div>
    </div>

    <div class="input-panel">
        <div id="attach-preview" style="display:none;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center;"></div>
        <div class="input-row">
            <textarea id="input-area" placeholder="输入消息，Shift+Enter 换行，Enter 发送..."></textarea>
            <button class="attach-btn" id="attach-btn" title="添加图片或音频">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
            </button>
            <input type="file" id="file-input" accept="image/*,audio/*" multiple>
            <button class="send-btn" id="send-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                </svg>
                <span id="send-label">发送</span>
            </button>
        </div>
        <div class="model-bar">
            <label for="model-select">模型：</label>
            <select id="model-select" style="font-size:0.9rem; padding:6px 10px;"></select>

            <button class="think-btn active" id="think-btn" style="font-size:0.88rem; padding:5px 14px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
                深度思考
            </button>
        </div>
        <p style="text-align:center;font-size:0.7rem;color:#30363d;padding:8px 0 0">
            <a href="https://beian.miit.gov.cn/" target="_blank" style="color:#30363d">粤ICP备2026012488号-1</a>
        </p>
    </div>
</div>

<script>
    // ==========================================
    // CONFIG
    // DeepSeek API: https://api-docs.deepseek.com/zh-cn/
    // MiniMax API: https://platform.minimaxi.com/docs/api-reference/
    // MiMo API: https://platform.xiaomimimo.com/docs/quick-start/first-api-call
    // xAI (Grok) API: https://openrouter.ai/x-ai/grok-4.1-fast/api
    // ==========================================

    const MODEL_CONFIG = {
        deepseek: {
            models: [
                { id: 'deepseek-v4-flash', name: 'V4-flash' },
                { id: 'deepseek-v4-pro',   name: 'V4-Pro' }
            ]
        },
        minimax: {
            models: [
                { id: 'MiniMax-M2.7', name: 'M2.7' },

    async function fetchQuota() {
        const token = localStorage.getItem('ai_token');
        if (!token) { quotaCache = null; return; }
        try {
            const resp = await fetch('https://api.oscarstudio.cn/api/user', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await resp.json();
            if (data.success && data.user) {
                quotaCache = {
                    remaining: data.user.quota?.credits?.remaining ?? 0,
                    limit: data.user.quota?.credits?.limit ?? 0,
                    used: data.user.quota?.credits?.used ?? 0,
                    tier: data.user.tier || 'standard',
                };
            }
        } catch (e) {
            console.warn('获取配额失败:', e.message);
        }
    }

    function getRemainingCredits() {
        if (!quotaCache) return null;
        return quotaCache.remaining;
    }

    function checkQuota() {
        const remaining = getRemainingCredits();
        if (remaining === null) return { allowed: true, remaining: 999999 };
        return { allowed: remaining > 0, remaining };
    }

    attachEl.btn.addEventListener('click', () => attachEl.input.click());
    attachEl.input.addEventListener('change', async () => {

    function renderAttachPreview() {
        attachEl.preview.style.display = attachments.length ? 'flex' : 'none';
        attachEl.preview.innerHTML = '';
        attachments.forEach((att, i) => {

            del.addEventListener('click', () => {
                attachments.splice(i, 1);

    thinkBtn.addEventListener('click', () => {

    // ==========================================
    // SEND
    // ==========================================
    async function handleSend() {
        if (isGenerating) {
            abortCtrl.abort();
            return;
        }
        const text = inputArea.value.trim();
        if (!text) return;

        // 配额检查
        const { allowed, remaining } = checkQuota();
        if (!allowed) {
            alert('今日 Credits 配额已用完，请明天再试或升级会员');
            return;
        }

        welcome.style.display = 'none';
        inputArea.value = '';
        userScrolledUp = false;  // 重置滚动状态
        appendMsg('user', text, attachments);
        history.push(buildMultimodalContent(text, attachments));
        attachments = [];
        updateAttachCount();

        setLoading(true);

        const aiDiv = appendMsg('ai', '');
        currentAiDiv = aiDiv;
        const reasoningDiv = document.createElement('div');
        reasoningDiv.className = 'reasoning-block';
        const reasoningHeader = document.createElement('div');
        reasoningHeader.className = 'reasoning-header';
        reasoningHeader.innerHTML = `<span class="think-label">思考中</span><span class="think-time"></span><span class="think-arrow">&#9654;</span>`;
        const reasoningBody = document.createElement('div');
        reasoningBody.className = 'reasoning-body';

        function finishThinking() {
            if (_thinkingFinished) return;
            _thinkingFinished = true;
            const elapsed = Date.now() - thinkStartTime;
            const secs = Math.round(elapsed / 1000);
            const label = secs >= 60 ? `${Math.floor(secs/60)}分${secs%60}秒` : `${secs}秒`;
            reasoningHeader.querySelector('.think-label').textContent = '已深度思考';
            reasoningHeader.querySelector('.think-time').textContent = label;
            reasoningDiv.classList.remove('expanded');
        }

        reasoningHeader.addEventListener('click', () => {
            const expanded = reasoningDiv.classList.toggle('expanded');
            reasoningHeader.classList.toggle('expanded', expanded);
            _reasoningExpanded = expanded;
        });

        // Update reasoning time every second during thinking
        let _thinkStopped = false;
        let _thinkingFinished = false; // 防止 finishThinking 重复执行
        let _reasoningExpanded = false; // user手动展开过就不再自动收
        const _thinkTimer = setInterval(() => {
            if (_thinkStopped || _thinkingFinished) return;
            if (!isGenerating) return;
            reasoningDiv.style.display = 'block';
            const elapsed = Date.now() - thinkStartTime;
            const secs = Math.round(elapsed / 1000);
            const label = secs >= 60 ? `${Math.floor(secs/60)}分${secs%60}秒` : `${secs}秒`;
            reasoningHeader.querySelector('.think-time').textContent = label;
        }, 1000);

        reasoningDiv.appendChild(reasoningHeader);
        reasoningDiv.appendChild(reasoningBody);
        aiDiv.querySelector('.msg-bubble').prepend(reasoningDiv);

        const contentDiv = aiDiv.querySelector('.content');
        contentDiv.classList.add('typing');

        abortCtrl = new AbortController();

        let fullResponse = '';
        let fullReasoning = '';
        let outputChars = 0;
        let usageReceived = false; // 是否已收到后端发来的真实 usage
        const isMiniMax = provider === 'minimax';
        const thinkStartTime = Date.now();

        const body = {
            model: modelId,
            messages: history,
            stream: true
        };

        // 统计输入字符数（快速估算 tokens）
        let promptChars = 0;
        for (const msg of history) {
            if (msg.content) promptChars += msg.content.length;
        }

        // DeepSeek：显式控制开关，thinking 放 extra_body
        if (provider === 'deepseek') {
            body.extra_body = {
                thinking: { type: thinking ? 'enabled' : 'disabled' }
            };
            if (thinking) {
                body.extra_body.reasoning_effort = 'high';
            }
        }

        // MiniMax：思考无法关闭，始终强制开启并分离显示
        if (isMiniMax) {
            body.reasoning_split = true;
        }

        // MiMo：thinking 参数放顶层
        if (provider === 'mimo') {
            body.thinking = {
                type: thinking ? 'enabled' : 'disabled',
                budget_tokens: thinking ? 2048 : undefined
            };
        }

        // xAI Grok via OpenRouter
        if (provider === 'xai' && modelId === 'x-ai/grok-4.3') {
            body.extra_body = {
                reasoning: thinking ? 'enabled' : 'disabled'
            };
        }
        
        try {
            const token = localStorage.getItem('ai_token');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            // 设置 60 秒超时
            const timeoutId = setTimeout(() => abortCtrl.abort(), 60000);
            const resp = await fetch('https://api.oscarstudio.cn/api/chat', {
                method: 'POST',
                headers,
                body: JSON.stringify(body),
                signal: abortCtrl.signal
            });
            clearTimeout(timeoutId);

            if (resp.status === 401) {
                throw new Error('请先登录后再使用 (401 未登录)');
            }
            if (resp.status === 502) {
                const errData = await resp.json().catch(() => ({}));
                throw new Error(errData.message || 'API 服务暂时不可用，请稍后再试');
            }
            if (resp.status === 403) {
                const errData = await resp.json().catch(() => ({}));
                throw new Error(errData.message || '今日配额已用完，请明天再试或升级会员');
            }
            if (!resp.ok) {
                const err = await resp.text();
                throw new Error(`API ${resp.status}: ${err}`);
            }

            contentDiv.classList.remove('typing');
            const reader = resp.body.getReader();
            const dec = new TextDecoder();
            let buf = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buf += dec.decode(value, { stream: true });

                // 兼容 \r\n、\r、\n 三种行尾
                let lines = buf.split(/\r\n|\r|\n/);
                buf = lines.pop() || '';

                for (const line of lines) {
                    if (!line.startsWith('data')) continue;
                    const s = line.slice(line.charAt(5) === ' ' ? 6 : 5);
                    if (s === '[DONE]') continue;

                    try {
                        const d = JSON.parse(s);

                        // xAI reasoning — 仅在思考开启时显示
                        if (provider === 'xai' && modelId === 'x-ai/grok-4.3' && thinking) {
                            const delta = d.choices?.[0]?.delta;
                            if (delta?.reasoning) {
                                fullReasoning += delta.reasoning;
                                outputChars += delta.reasoning.length;
                                reasoningBody.textContent = fullReasoning;
                                reasoningDiv.style.display = 'block';
                                if (!_reasoningExpanded) reasoningDiv.classList.remove('expanded');
                                scrollBottom();
                            }
                        }
                        // Qwen / GLM / Kimi / Hy3 reasoning via OpenRouter
                        if (['qwen', 'zai', 'moonshot', 'hy3'].includes(provider) && thinking) {
                            const delta = d.choices?.[0]?.delta;
                            if (delta) {
                                // 尝试多个可能的 reasoning 字段名
                                const reasoningText = delta.reasoning || delta.thinking || delta.reasoning_content || delta.thought;
                                if (reasoningText) {
                                    fullReasoning += reasoningText;
                                    outputChars += reasoningText.length;
                                    reasoningBody.textContent = fullReasoning;
                                    reasoningDiv.style.display = 'block';
                                    reasoningDiv.classList.remove('expanded');
                                    scrollBottom();
                                }
                            }
                        }
                        // MiniMax reasoning
                        if (isMiniMax && d.choices?.[0]?.delta) {
                            const delta = d.choices[0].delta;
                            if (delta.reasoning_details) {
                                for (const rd of delta.reasoning_details) {
                                    if (rd.text) {
                                        fullReasoning += rd.text;
                                        outputChars += rd.text.length;
                                    }
                                }
                                reasoningBody.textContent = fullReasoning;
                                reasoningDiv.style.display = 'block';
                                if (!_reasoningExpanded) reasoningDiv.classList.remove('expanded');
                                scrollBottom();
                            }
                            if (delta.content) {
                                _thinkStopped = true;
                                clearInterval(_thinkTimer);
                                finishThinking();
                                fullResponse += delta.content;
                                outputChars += delta.content.length;
                                // 流式渲染 Markdown（使用 DOMPurify 防止 XSS）
                                const rendered = marked.parse(fullResponse, { async: false });
                                contentDiv.innerHTML = DOMPurify.sanitize(rendered);
                                renderMath(contentDiv);
                                scrollBottom();
                            }
                        }
                        // DeepSeek / MiMo reasoning — 仅在思考开启时显示
                        else if ((provider === 'deepseek' || provider === 'mimo') && d.choices?.[0]?.delta?.reasoning_content && thinking) {
                            fullReasoning += d.choices[0].delta.reasoning_content;
                            outputChars += d.choices[0].delta.reasoning_content.length;
                            reasoningBody.textContent = fullReasoning;
                            reasoningDiv.style.display = 'block';
                            reasoningDiv.classList.remove('expanded');
                            scrollBottom();
                        }

                        // Answer content — stop thinking timer once answer starts
                        if (!isMiniMax && d.choices?.[0]?.delta?.content) {
                            clearInterval(_thinkTimer);
                            _thinkStopped = true;
                            finishThinking();
                            const content = d.choices[0].delta.content;
                            fullResponse += content;
                            outputChars += content.length;
                            // 流式渲染 Markdown（使用 DOMPurify 防止 XSS）
                            const rendered = marked.parse(fullResponse, { async: false });
                            setContent(contentDiv, rendered);
                            scrollBottom();
                        }

                        // 后端发来的真实 token 使用数据（优先于远端 API 的 usage）
                        if (d._type === 'usage') {
                            usageReceived = true;
                            updateStats(d);
                        } else if (d.usage) {
                            updateStats(d.usage);
                        }
                    } catch (e) {
                        console.warn('[SSE parse error]', e.message, '| raw:', line);
                    }
                }
            }

            // 处理 buf 里最后残留的不完整行
            if (buf.trim()) {
                const lastLine = buf.trim();
                if (lastLine.startsWith('data')) {
                    const s = lastLine.slice(lastLine.charAt(5) === ' ' ? 6 : 5);
                    if (s !== '[DONE]') {
                        try {
                            const d = JSON.parse(s);
                            if (!isMiniMax && d.choices?.[0]?.delta?.content) {
                                fullResponse += d.choices[0].delta.content;
                                outputChars += d.choices[0].delta.content.length;
                            }
                        } catch (_) {}
                    }
                }
            }

            // flush TextDecoder 中可能残留的多字节字符
            const remainder = dec.decode();
            if (remainder) {
                fullResponse += remainder;
                outputChars += remainder.length;
            }

            // 更新 token 统计（估算，仅当没收到后端真实数据时使用）
            if (!usageReceived) {
                updateStats({
                    input_tokens: Math.max(1, Math.ceil(promptChars / 4)),
                    output_tokens: Math.max(1, Math.ceil(outputChars / 4)),
                    total_tokens: Math.max(1, Math.ceil((promptChars + outputChars) / 4))
                });
            }

            history.push({ role: 'assistant', content: fullResponse });
            const r = typeof marked !== 'undefined' ? marked.parse(fullResponse) : fullResponse;
            if (r instanceof Promise) {
                r.then(html => { setContent(contentDiv, html); });
            } else {
                setContent(contentDiv, r);
            }

        } catch (err) {
            contentDiv.classList.remove('typing');
            if (err.name === 'AbortError') {
                contentDiv.textContent = (fullResponse || '') + '\n[已停止生成]';
                if (fullResponse) history.push({ role: 'assistant', content: fullResponse });
            } else {
                contentDiv.textContent = `[出错: ${err.message}]`;
            }
        } finally {
            setLoading(false);
            abortCtrl = null;
            currentAiDiv = null;
            clearInterval(_thinkTimer);
            fetchQuota().then(() => updateQuotaUI());
        }
    }

    // ==========================================
    // HELPERS
    // ==========================================
    function buildMultimodalContent(text, attachments) {
        if (!attachments || attachments.length === 0) {
            return { role: 'user', content: text };
        }
        const content = [{ type: 'text', text }];
        for (const att of attachments) {
            if (att.type === 'image') {
                content.push({ type: 'image_url', image_url: { url: att.url } });
            } else if (att.type === 'audio') {
                content.push({ type: 'audio', audio_url: { url: att.url } });
            }
        }
        return { role: 'user', content };
    }

    function appendMsg(role, text, meta) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = role === 'user' ? 'U' : 'A';

        const body = document.createElement('div');
        body.className = 'msg-body';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        if (role === 'ai') {
            const content = document.createElement('div');
            content.className = 'content';
            if (text) content.textContent = text;
            bubble.appendChild(content);
        } else {
            bubble.textContent = text;
            // 渲染附件缩略图
            if (meta && meta.length > 0) {
                const attachRow = document.createElement('div');
                attachRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;';
                for (const att of meta) {
                    if (att.type === 'image') {
                        const img = document.createElement('img');
                        img.src = att.url;
                        img.style.cssText = 'max-width:120px;max-height:80px;border-radius:6px;border:1px solid var(--border);object-fit:cover;cursor:pointer;';
                        img.addEventListener('click', () => window.open(att.url, '_blank'));
                        attachRow.appendChild(img);
                    } else if (att.type === 'audio') {
                        const audio = document.createElement('audio');
                        audio.src = att.url;
                        audio.controls = true;
                        audio.style.cssText = 'max-width:200px;height:32px;';
                        attachRow.appendChild(audio);
                    }
                }
                bubble.appendChild(attachRow);
            }
        }

        body.appendChild(bubble);

        // meta row: copy + token
        const metaRow = document.createElement('div');
        metaRow.className = 'msg-meta';

        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.title = '复制';
        copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>复制`;
        copyBtn.addEventListener('click', () => {
            const src = role === 'ai'
                ? bubble.querySelector('.content')?.textContent || ''
                : bubble.textContent || '';
            navigator.clipboard.writeText(src).then(() => {
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>已复制`;
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>复制`;
                }, 1500);
            });
        });

        if (role === 'ai') {
            const tokenBtn = document.createElement('button');
            tokenBtn.className = 'token-btn';
            tokenBtn.title = '用量详情';
            const tip = document.createElement('div');
            tip.className = 'token-tip';
            if (meta) {
                tip.innerHTML = `输入: <span>${meta.input || 0}</span> &nbsp;|&nbsp; 输出: <span>${meta.output || 0}</span>`;
                tokenBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>${meta.total || 0}`;
            } else {
                tip.innerHTML = `输入: <span>–</span> &nbsp;|&nbsp; 输出: <span>–</span>`;
                tokenBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>–`;
            }
            tokenBtn.appendChild(tip);
            metaRow.appendChild(tokenBtn);
        }

        metaRow.appendChild(copyBtn);
        body.appendChild(metaRow);

        div.appendChild(avatar);
        div.appendChild(body);
        chat.appendChild(div);
        scrollBottom();
        return div;
    }

    function renderMd(el, text) {
        if (typeof marked !== 'undefined') {
            const r = marked.parse(text);
            if (r instanceof Promise) {
                r.then(html => {
                    el.innerHTML = DOMPurify.sanitize(html);
                    renderMath(el);
                });
            } else {
                el.innerHTML = DOMPurify.sanitize(r);
                renderMath(el);
            }
        } else {
            el.textContent = text;
        }
    }

    function renderMdFinal(el, text) {
        const r = typeof marked !== 'undefined' ? marked.parse(text) : text;
        if (r instanceof Promise) {
            r.then(html => {
                el.innerHTML = DOMPurify.sanitize(html);
                renderMath(el);
            });
        } else {
            el.innerHTML = DOMPurify.sanitize(r);
            renderMath(el);
        }
    }

    function renderMath(el) {
        if (typeof renderMathInElement !== 'undefined') {
            renderMathInElement(el, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false },
                ],
                throwOnError: false
            });
        }
    }

    function addCodeCopyBtns(el) {
        el.querySelectorAll('pre').forEach(pre => {
            if (pre.querySelector('.copy-btn')) return;
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = '复制';
            btn.addEventListener('click', () => {
                const code = pre.querySelector('code')?.textContent || pre.textContent;
                navigator.clipboard.writeText(code).then(() => {
                    btn.textContent = '已复制';
                    setTimeout(() => { btn.textContent = '复制'; }, 1500);
                });
            });
            pre.appendChild(btn);
        });
    }

    function setContent(el, html) {
        el.innerHTML = DOMPurify.sanitize(html);
        renderMath(el);
        addCodeCopyBtns(el);
    }

    function scrollBottom(force) {
        const chat = document.getElementById('chat');
        if (force !== true && userScrolledUp) return;
        chat.scrollTop = chat.scrollHeight;
    }

    function setLoading(on) {
        isGenerating = on;
        sendBtn.classList.toggle('stop', on);
        sendLabel.textContent = on ? '停止' : '发送';
        inputArea.disabled = false;
    }

    function updateStats(u) {
        if (!u) return;
        const input = u.input_tokens ?? u.prompt_tokens ?? 0;
        const output = u.output_tokens ?? u.completion_tokens ?? 0;
        const total = u.total_tokens ?? 0;
        statTotal.textContent = total;

        // 更新当前 AI 消息框的 token 按钮（本次用量）
        if (currentAiDiv) {
            const tokenBtn = currentAiDiv.querySelector('.token-btn');
            if (tokenBtn) {
                const tip = tokenBtn.querySelector('.token-tip');
                if (tip) {
                    tip.innerHTML = `输入: <span>${input}</span> &nbsp;|&nbsp; 输出: <span>${output}</span>`;
                }
                for (let i = 0; i < tokenBtn.childNodes.length; i++) {
                    if (tokenBtn.childNodes[i].nodeType === 3) {
                        tokenBtn.childNodes[i].textContent = total;
                        break;
                    }
                }
            }
        }
    }

    function clearStats() {
        statTotal.textContent = '0';
    }

    // ==========================================
    // PREMIUM / QUOTA UI
    // ==========================================
    const quotaBadge = document.getElementById('quota-badge');
    const quotaNum   = document.getElementById('quota-num');

    function updateQuotaUI() {
        const remaining = getRemainingCredits();
        if (remaining === null || remaining === Infinity) {
            quotaBadge.style.display = 'none';
        } else {
            quotaBadge.style.display = 'inline';
            quotaNum.textContent = remaining.toLocaleString();
        }
    }

    // 初始化
    updateQuotaUI();
    fetchQuota(); // 加载后立即获取服务端配额
</script>
<script src="../user-button.js"></script>
</body>
</html>
