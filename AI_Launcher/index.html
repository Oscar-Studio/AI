<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="d6ee6da5-3779-4551-a754-7f63fdf95dbb"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI Launcher</title>
    <style>
        :root {
            --primary-color: #2A5CAA;
            --secondary-color: #00E5FF;
            --accent-color: #6A00FF;
            --light-color: #010409;
            --dark-color: #ffffff;
            --card-bg: #0d1117;
            --card-border: 1px solid #30363d;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            --text-secondary: #8b949e;
            --msg-user-bg: #1f6feb;
            --msg-ai-bg: #161b22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--dark-color);
            overflow: hidden;
            /* Prevent body scroll, let chat container scroll */
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            font-weight: 600;
        }

        button:hover {
            background: #1a4a9a;
        }

        button:disabled {
            background: #30363d;
            cursor: not-allowed;
            color: #8b949e;
        }

        button.stop-btn {
            background: #da3633;
        }

        button.stop-btn:hover {
            background: #b62324;
        }

        button.secondary-btn {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 5px 15px;
            font-size: 14px;
        }

        button.secondary-btn:hover {
            background: #30363d;
            border-color: #8b949e;
        }

        /* Main Application */
        #app-container {
            display: none;
            /* Hidden by default */
            width: 100%;
            height: 100vh;
            flex-direction: column;
            max-width: 1200px;
            background: var(--card-bg);
            border-left: var(--card-border);
            border-right: var(--card-border);
        }

        header {
            padding: 1rem;
            border-bottom: var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #161b22;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-size: 1.2rem;
            color: var(--secondary-color);
            margin: 0;
        }

        .stats-bar {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            gap: 15px;
        }

        .stats-item strong {
            color: var(--secondary-color);
        }

        select {
            background: #010409;
            color: white;
            border: 1px solid #30363d;
            padding: 5px 10px;
            border-radius: 4px;
            outline: none;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 8px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--msg-user-bg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--msg-ai-bg);
            border: 1px solid #30363d;
            color: #e6edf3;
            border-bottom-left-radius: 2px;
            white-space: pre-wrap;
            /* Simple markdown support */
        }

        .message.ai .reasoning {
            display: block;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent-color);
            color: #8b949e;
            font-size: 0.9em;
            font-style: italic;
        }

        .message.error {
            align-self: center;
            background-color: rgba(218, 54, 51, 0.1);
            border: 1px solid #da3633;
            color: #ff7b72;
            text-align: center;
        }

        .typing-indicator::after {
            content: '...';
            animation: typing 1s infinite;
        }

        @keyframes typing {
            0% {
                content: '.';
            }

            33% {
                content: '..';
            }

            66% {
                content: '...';
            }
        }

        .input-area {
            padding: 1rem;
            background: #161b22;
            border-top: var(--card-border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            resize: none;
            height: 80px;
            margin-bottom: 0;
            font-family: inherit;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls button {
            height: 80px;
            /* Match textarea height for the single button */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            font-weight: bold;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #010409;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #8b949e;
        }

        /* Markdown Rendering */
        .message.ai .content {
            white-space: pre-wrap;
        }

        .message.ai .content code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }

        .message.ai .content pre {
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message.ai .content pre code {
            background: none;
            padding: 0;
        }

        .message.ai .content blockquote {
            border-left: 3px solid #6A00FF;
            margin: 10px 0;
            padding-left: 15px;
            color: #8b949e;
        }

        .message.ai .content a {
            color: #00E5FF;
        }

        .message.ai .content ul,
        .message.ai .content ol {
            margin: 10px 0;
            padding-left: 25px;
        }

        .message.ai .content h1,
        .message.ai .content h2,
        .message.ai .content h3,
        .message.ai .content h4,
        .message.ai .content h5,
        .message.ai .content h6 {
            margin: 15px 0 10px 0;
            color: #00E5FF;
        }

        .message.ai .content table {
            border-collapse: collapse;
            margin: 10px 0;
            width: 100%;
        }

        .message.ai .content th,
        .message.ai .content td {
            border: 1px solid #30363d;
            padding: 8px 12px;
        }

        .message.ai .content th {
            background: rgba(255, 255, 255, 0.05);
        }

        .message.ai .content p {
            margin: 10px 0;
        }

        .message.ai .content p:first-child {
            margin-top: 0;
        }

        .message.ai .content img {
            max-width: 100%;
            border-radius: 8px;
        }
    </style>

<body>

    <!-- Main App -->
    <div id="app-container">
        <header>
            <div class="header-left">
                <h1>AI Launcher</h1>
                <select id="model-select">
                    <option value="deepseek-chat">DeepSeek Chat (快速回答)</option>
                    <option value="deepseek-reasoner">DeepSeek Reasoner (深度思考)</option>
                    <option value="MiniMax-M2.7">MiniMax-M2.7 (思考模型)</option>
                </select>
                <button id="new-chat-btn" class="secondary-btn">开启新对话</button>
            </div>
            <div class="stats-bar">
                <span class="stats-item">Input: <strong id="token-input">0</strong></span>
                <span class="stats-item">Output: <strong id="token-output">0</strong></span>
                <span class="stats-item">Total: <strong id="token-total">0</strong></span>
            </div>
        </header>

        <div id="chat-window">
            <div class="message ai">你好！我是 DeepSeek AI 助手。有什么我可以帮你的吗？</div>
        </div>

        <div class="input-area">
            <textarea id="user-input" placeholder="请输入你的问题... (Shift + Enter 换行)"></textarea>
            <div class="controls">
                <button id="action-btn" onclick="handleAction()">发送</button>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        // 用户请在此处填入 BASE64 编码后的值
        // 可以使用在线工具比如 https://www.base64encode.org/ 进行编码
        // API 密钥已移至后端服务器环境变量，前端不再存储
        // =================================================

        let controller = null; // For aborting fetch
        let markdownUpdateTimer = null; // For debouncing markdown updates

        const appContainer = document.getElementById('app-container');
        // 初始化：直接显示主界面（无需密码）
        appContainer.style.display = 'flex';

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const actionBtn = document.getElementById('action-btn');
        const newChatBtn = document.getElementById('new-chat-btn');
        const modelSelect = document.getElementById('model-select');

        const tokenInputDisp = document.getElementById('token-input');
        const tokenOutputDisp = document.getElementById('token-output');
        const tokenTotalDisp = document.getElementById('token-total');

        // Chat Logic
        const history = []; // {role: 'user'|'assistant', content: string}

        // Debounced markdown rendering for streaming
        function debouncedRenderMarkdown(element, text) {
            if (markdownUpdateTimer) clearTimeout(markdownUpdateTimer);
            markdownUpdateTimer = setTimeout(() => {
                if (typeof marked !== 'undefined') {
                    const result = marked.parse(text);
                    if (result instanceof Promise) {
                        result.then(html => element.innerHTML = html);
                    } else {
                        element.innerHTML = result;
                    }
                } else {
                    element.textContent = text;
                }
            }, 150);
        }

        function handleAction() {
            if (controller) {
                stopGeneration();
            } else {
                sendMessage();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // UI Updates
            userInput.value = '';
            appendMessage('user', text);
            history.push({ role: 'user', content: text });

            setLoading(true);

            // Create placeholder
            const aiMsgDiv = appendMessage('ai', '');

            // Create separate containers for reasoning and content
            const reasoningDiv = document.createElement('div');
            reasoningDiv.className = 'reasoning';
            reasoningDiv.style.display = 'none'; // Initially hidden
            aiMsgDiv.appendChild(reasoningDiv);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            contentDiv.classList.add('typing-indicator'); // Indicator on content
            aiMsgDiv.appendChild(contentDiv);


            const model = modelSelect.value;
            controller = new AbortController();

            let fullAiResponse = "";
            let fullReasoning = "";
            let isMiniMax = model.startsWith('MiniMax');

            // 通过后端代理请求
            const requestBody = {
                model: model,
                messages: history,
                stream: true
            };
            if (isMiniMax) {
                requestBody.reasoning_split = true;
            }

            try {
                const response = await fetch('https://api.oscarstudio.cn/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody),
                    signal: controller.signal
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`API Error: ${response.status} - ${errText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                contentDiv.classList.remove('typing-indicator');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') break;

                            try {
                                const data = JSON.parse(dataStr);

                                // MiniMax 思考内容处理
                                // reasoning_split=true 时，思考内容在 reasoning_details 字段
                                if (isMiniMax && data.choices && data.choices[0].delta) {
                                    const delta = data.choices[0].delta;
                                    // 优先从 reasoning_details 提取思考内容
                                    if (delta.reasoning_details && delta.reasoning_details[0]) {
                                        for (const detail of delta.reasoning_details) {
                                            if (detail.text) {
                                                fullReasoning += detail.text;
                                            }
                                        }
                                        reasoningDiv.textContent = fullReasoning;
                                        reasoningDiv.style.display = 'block';
                                        scrollToBottom();
                                    }
                                    // 回答内容从 content 字段提取
                                    if (delta.content) {
                                        fullAiResponse += delta.content;
                                        debouncedRenderMarkdown(contentDiv, fullAiResponse);
                                        scrollToBottom();
                                    }
                                }
                                // DeepSeek 思考内容处理
                                else if (data.choices && data.choices[0].delta.reasoning_content) {
                                    const rContent = data.choices[0].delta.reasoning_content;
                                    fullReasoning += rContent;
                                    reasoningDiv.textContent = fullReasoning;
                                    reasoningDiv.style.display = 'block';
                                    scrollToBottom();
                                }

                                // DeepSeek 回答内容处理
                                if (!isMiniMax && data.choices && data.choices[0].delta.content) {
                                    fullAiResponse += data.choices[0].delta.content;
                                    debouncedRenderMarkdown(contentDiv, fullAiResponse);
                                    scrollToBottom();
                                }

                                if (data.usage) {
                                    updateStats(data.usage);
                                }
                            } catch (e) { }
                        }
                    }
                }

                // Add AI response to history on success
                // Note: We generally do NOT push reasoning content to history for future context, usually just the final answer.
                history.push({ role: 'assistant', content: fullAiResponse });

                // Final markdown render after streaming completes
                const finalResult = marked.parse(fullAiResponse);
                if (finalResult instanceof Promise) {
                    finalResult.then(html => contentDiv.innerHTML = html);
                } else {
                    contentDiv.innerHTML = finalResult;
                }

            } catch (error) {
                if (error.name === 'AbortError') {
                    contentDiv.textContent += '\n[已停止生成]';
                    if (fullAiResponse) history.push({ role: 'assistant', content: fullAiResponse });
                } else {
                    contentDiv.classList.remove('typing-indicator');
                    contentDiv.textContent += `\n[出错: ${error.message}]`;
                }
            } finally {
                setLoading(false);
                controller = null;
            }
        }

        function stopGeneration() {
            if (controller) {
                controller.abort();
                controller = null;
                setLoading(false);
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'ai') {
                // For AI, we might structure it later, but initially empty or text
                // logic handled inside sendMessage
            } else {
                div.textContent = text;
            }
            chatWindow.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function setLoading(loading) {
            if (loading) {
                actionBtn.textContent = '停止';
                actionBtn.classList.add('stop-btn');
                userInput.disabled = false;
            } else {
                actionBtn.textContent = '发送';
                actionBtn.classList.remove('stop-btn');
                userInput.focus();
            }
        }

        function updateStats(usage) {
            if (!usage) return;
            // DeepSeek 格式
            if (usage.prompt_tokens !== undefined) tokenInputDisp.textContent = usage.prompt_tokens;
            if (usage.completion_tokens !== undefined) tokenOutputDisp.textContent = usage.completion_tokens;
            if (usage.total_tokens !== undefined) tokenTotalDisp.textContent = usage.total_tokens;
            // Anthropic/MiniMax 格式
            if (usage.input_tokens !== undefined) tokenInputDisp.textContent = usage.input_tokens;
            if (usage.output_tokens !== undefined) tokenOutputDisp.textContent = usage.output_tokens;
            if (usage.total_tokens !== undefined) tokenTotalDisp.textContent = usage.total_tokens;
        }

        // Bind Shift+Enter to new line, Enter to send
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleAction(); // Trigger action
            }
        });

        // New Chat Logic
        newChatBtn.addEventListener('click', () => {
            history.length = 0; // Clear history array

            // Allow stopping current generation if active
            if (controller) stopGeneration();

            // Visual indicator
            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.color = '#8b949e';
            div.style.margin = '1rem 0';
            div.style.fontSize = '0.9rem';
            div.textContent = '--- 新对话开始 (上下文已清除) ---';
            chatWindow.appendChild(div);
            scrollToBottom();
        });
    </script>
