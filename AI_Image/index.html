<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 图片生成</title>
    <style>
        :root {
            --primary: #2A5CAA;
            --primary-hover: #1a4a9a;
            --accent: #00E5FF;
            --accent-dim: rgba(0, 229, 255, 0.12);
            --bg: #010409;
            --surface: #0d1117;
            --surface-2: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        #app {
            display: none;
            max-width: 860px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .quota-pill {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
        }

        .quota-pill strong {
            color: var(--accent);
        }

        /* ===== GENERATOR CARD ===== */
        .generator-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .generator-card label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .prompt-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        #prompt-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 10px 14px;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.15s;
            min-height: 44px;
            max-height: 120px;
        }

        #prompt-input:focus {
            border-color: var(--accent);
        }

        #prompt-input::placeholder {
            color: var(--text-secondary);
        }

        .generate-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
            min-width: 80px;
        }

        .generate-btn:hover { background: var(--primary-hover); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .generate-btn.stop { background: #c93b3b; }

        .size-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .size-row select {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.82rem;
            outline: none;
            cursor: pointer;
        }

        .size-row select option { background: var(--surface-2); }

        /* ===== GALLERY ===== */
        .gallery-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .gallery-header h2 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .img-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            animation: cardIn 0.25s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .img-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .img-card img:hover { opacity: 0.85; }

        .img-card .img-footer {
            padding: 8px 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .img-card .img-footer a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.72rem;
        }

        .img-card .img-footer a:hover { text-decoration: underline; }

        /* ===== LOADING ===== */
        .loading-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== ERROR ===== */
        .error-msg {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid #ff4d4d;
            border-radius: 8px;
            color: #ff7b72;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            font-size: 0.88rem;
        }

        .empty-state .emoji {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* ===== LOGIN PROMPT ===== */
        #login-prompt {
            display: none;
            text-align: center;
            padding: 5rem 1rem;
        }

        #login-prompt h2 {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 8px;
        }

        #login-prompt p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: transform 0.3s ease;
            z-index: 999;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .prompt-row { flex-direction: column; }
            .generate-btn { width: 100%; padding: 10px; }
        }
    </style>
</head>
<body>

<div id="login-prompt">
    <h2>请先登录</h2>
    <p>登录后即可使用 AI 图片生成功能</p>
</div>

<div id="app">
    <header>
        <h1>🎨 AI 图片生成</h1>
        <div class="header-right">
            <div class="quota-pill" id="quota-pill">
                今日已用 <strong id="quota-used">0</strong> / <strong id="quota-limit">20000</strong> credits
            </div>
        </div>
    </header>

    <div class="generator-card">
        <label for="prompt-input">描述你想生成的图片</label>
        <div class="prompt-row">
            <textarea id="prompt-input" placeholder="例如：一只戴着墨镜的柴犬站在海边，夕阳西下，写实风格..." rows="1"></textarea>
            <button class="generate-btn" id="generate-btn">生成</button>
        </div>
        <div class="size-row">
            <label for="size-select">尺寸：</label>
            <select id="size-select">
                <option value="1024x1024">1:1 方图 (1024×1024)</option>
                <option value="1536x1024">3:4 竖图 (1536×1024)</option>
                <option value="1024x1536">4:3 横图 (1024×1536)</option>
                <option value="1792x1024">16:9 宽图 (1792×1024)</option>
                <option value="1024x1792">9:16 竖图 (1024×1792)</option>
            </select>
        </div>
        <div id="error-box"></div>
    </div>

    <div class="gallery-header">
        <h2>生成结果</h2>
        <button id="clear-btn" style="background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:4px 12px;border-radius:6px;font-size:0.75rem;cursor:pointer;display:none;">清空</button>
    </div>

    <div class="gallery" id="gallery">
        <div class="empty-state" id="empty-state">
            <div class="emoji">🖼️</div>
            <p>还没有生成过图片<br/>在上方输入描述并点击「生成」</p>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const API_BASE = 'https://api.oscarstudio.cn';
const MAX_RETRIES = 60; // polling 上游生成状态最多 60 次

// ===== STATE =====
let isGenerating = false;
let currentSize = '1024x1024';
let quota = { used: 0, limit: 20000, remaining: 20000, tier: 'standard' };

// ===== ELEMENTS =====
const app = document.getElementById('app');
const loginPrompt = document.getElementById('login-prompt');
const promptInput = document.getElementById('prompt-input');
const generateBtn = document.getElementById('generate-btn');
const sizeSelect = document.getElementById('size-select');
const gallery = document.getElementById('gallery');
const emptyState = document.getElementById('empty-state');
const clearBtn = document.getElementById('clear-btn');
const quotaUsed = document.getElementById('quota-used');
const quotaLimit = document.getElementById('quota-limit');
const errorBox = document.getElementById('error-box');
const toast = document.getElementById('toast');

// ===== AUTH CHECK =====
function getToken() {
    return localStorage.getItem('ai_token');
}

function isLoggedIn() {
    return !!getToken();
}

async function checkLogin() {
    if (!isLoggedIn()) {
        app.style.display = 'none';
        loginPrompt.style.display = 'block';
        return false;
    }
    loginPrompt.style.display = 'none';
    app.style.display = 'block';
    return true;
}

// ===== QUOTA =====
async function fetchQuota() {
    try {
        const resp = await fetch(`${API_BASE}/api/image/quota`, {
            headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        const data = await resp.json();
        if (data.success) {
            quota = data.quota;
            updateQuotaUI();
        }
    } catch (e) {
        console.warn('获取配额失败:', e.message);
    }
}

function updateQuotaUI() {
    quotaUsed.textContent = quota.used;
    quotaLimit.textContent = quota.limit;
    const pill = document.getElementById('quota-pill');
    if (quota.remaining === 0) {
        pill.style.borderColor = '#ff4d4d';
        pill.style.color = '#ff7b72';
    } else {
        pill.style.borderColor = '';
        pill.style.color = '';
    }
}

// ===== TOAST =====
function showToast(msg, duration = 2500) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration);
}

// ===== ERROR =====
function showError(msg) {
    errorBox.innerHTML = `<div class="error-msg">${msg}</div>`;
}

function clearError() {
    errorBox.innerHTML = '';
}

// ===== AUTO-RESIZE textarea =====
promptInput.addEventListener('input', () => {
    promptInput.style.height = 'auto';
    promptInput.style.height = Math.min(promptInput.scrollHeight, 120) + 'px';
});

// ===== SIZE =====
sizeSelect.addEventListener('change', () => {
    currentSize = sizeSelect.value;
});

// ===== GENERATE =====
generateBtn.addEventListener('click', handleGenerate);
promptInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleGenerate();
    }
});

async function handleGenerate() {
    if (isGenerating) {
        // stop 不支持，直接忽略
        return;
    }
    const prompt = promptInput.value.trim();
    if (!prompt) {
        showError('请输入图片描述');
        return;
    }
    if (quota.remaining <= 0) {
        showError(`今日配额已用完（${quota.used}/${quota.limit}），请明天再试或升级会员`);
        return;
    }

    clearError();
    setLoading(true);

    try {
        const resp = await fetch(`${API_BASE}/api/image`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${getToken()}`
            },
            body: JSON.stringify({
                prompt,
                size: currentSize,
                response_format: 'url'
            })
        });

        const data = await resp.json();

        if (resp.status === 401) {
            showError('请先登录');
            return;
        }
        if (resp.status === 403 || (data.success === false && data.message && data.message.includes('配额'))) {
            showError(data.message || '今日图片配额已用完');
            quota.remaining = 0;
            updateQuotaUI();
            return;
        }
        if (!data.success) {
            showError(data.message || '生成失败，请稍后重试');
            return;
        }

        // 成功：更新配额
        if (data.quota) {
            quota = data.quota;
            updateQuotaUI();
        }

        // 提取图片 URL
        const imageData = data.data?.data || data.data;
        const imageUrl = imageData[0]?.url || imageData[0]?.b64_json;

        if (imageUrl) {
            addImageCard(imageUrl, prompt);
        }

        promptInput.value = '';
        promptInput.style.height = 'auto';
        showToast('生成成功 🎨');

    } catch (err) {
        showError(`网络错误: ${err.message}`);
    } finally {
        setLoading(false);
    }
}

function setLoading(on) {
    isGenerating = on;
    generateBtn.disabled = on;
    generateBtn.textContent = on ? '生成中...' : '生成';
}

// ===== GALLERY =====
function addImageCard(url, prompt) {
    if (emptyState) emptyState.style.display = 'none';
    clearBtn.style.display = 'inline';

    const card = document.createElement('div');
    card.className = 'img-card';

    const img = document.createElement('img');
    img.src = url;
    img.alt = prompt;
    img.loading = 'lazy';

    const footer = document.createElement('div');
    footer.className = 'img-footer';

    const promptText = document.createElement('span');
    promptText.textContent = prompt.length > 30 ? prompt.slice(0, 30) + '…' : prompt;

    const openLink = document.createElement('a');
    openLink.href = url;
    openLink.target = '_blank';
    openLink.textContent = '查看大图';

    footer.appendChild(promptText);
    footer.appendChild(openLink);
    card.appendChild(img);
    card.appendChild(footer);

    // 插入到 empty state 前面
    gallery.insertBefore(card, gallery.firstChild);
}

clearBtn.addEventListener('click', () => {
    const cards = gallery.querySelectorAll('.img-card');
    cards.forEach(c => c.remove());
    emptyState.style.display = 'block';
    clearBtn.style.display = 'none';
    quota = { used: 0, limit: quota.limit, remaining: quota.limit, tier: quota.tier };
    updateQuotaUI();
});

// ===== INIT =====
async function init() {
    const loggedIn = await checkLogin();
    if (!loggedIn) return;
    await fetchQuota();
}

init();
</script>
</body>
</html>
