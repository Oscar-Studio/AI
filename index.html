<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>AI Studio — Oscar Studio</title>
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="opilot.css">
</head>
<body>
    <!-- ===== Top Nav ===== -->
    <header class="top-nav">
        <div class="top-nav-left">
            <img src="logo.png" alt="Oscar Studio" class="top-nav-logo">
            <span class="top-nav-eyebrow">AI STUDIO</span>
        </div>
        <div class="top-nav-right">
            <div class="quota-pill" id="quotaPill" title="今日剩余 Credits">
                <span class="quota-label">CREDITS</span>
                <span class="quota-value" id="quotaValue">—</span>
            </div>
            <div id="userButtonContainer"></div>
        </div>
    </header>

    <div class="layout">
        <!-- ===== Left Sidebar ===== -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <button class="sidebar-item active" data-view="chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span>Chat</span>
                </button>
                <button class="sidebar-item" data-view="tts">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <span>TTS</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <span class="sidebar-eyebrow">MODEL</span>
                <button class="sidebar-model-btn" id="sidebarModelBtn" type="button" title="更换模型">
                    <span class="sidebar-model-vendor" id="sidebarModelVendor">DeepSeek</span>
                    <span class="sidebar-model-name" id="sidebarModelName">V4-Flash</span>
                    <svg class="sidebar-model-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="9 6 15 12 9 18"/>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- ===== Main View ===== -->
        <main class="main">
            <!-- ============ Chat View ============ -->
            <section class="view view-chat active" data-view="chat">
                <div class="chat-scroll" id="chatScroll">
                    <div class="chat-welcome" id="chatWelcome">
                        <span class="eyebrow-mono">TEXT GENERATION</span>
                        <h1 class="display-headline">Ask anything.<br>Build anything.</h1>
                    </div>
                </div>

                <div class="chat-input-panel">
                    <div class="attach-preview" id="attachPreview"></div>
                    <div class="input-row">
                        <button class="attach-btn" id="attachBtn" type="button" title="添加图片或音频" aria-label="添加附件">+</button>
                        <input type="file" id="fileInput" accept="image/*,audio/*" multiple hidden>
                        <textarea id="chatInput" placeholder="输入消息，Shift+Enter 换行，Enter 发送..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" type="button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="12" y1="19" x2="12" y2="5"/>
                                <polyline points="5 12 12 5 19 12"/>
                            </svg>
                            <span id="sendLabel">发送</span>
                        </button>
                    </div>
                    <div class="input-meta">
                        <span class="token-counter" id="tokenCounter">累计 0 tokens</span>
                        <button class="think-btn" id="thinkBtn" type="button" title="深度思考">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                            <span>深度思考</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- ============ TTS View ============ -->
            <section class="view view-tts" data-view="tts">
                <div class="tts-shell">
                    <header class="tts-header">
                        <span class="eyebrow-mono">VOICE SYNTHESIS</span>
                        <h1 class="display-headline tts-headline">Bring text to life.</h1>
                    </header>

                    <div class="tts-tabs" role="tablist">
                        <button class="tts-tab active" role="tab" data-tts-mode="builtin">内置音色</button>
                        <button class="tts-tab" role="tab" data-tts-mode="design">声音定制</button>
                        <button class="tts-tab" role="tab" data-tts-mode="clone">声音克隆</button>
                    </div>

                    <div class="tts-content">
                        <!-- Built-in voices -->
                        <div class="tts-panel active" data-tts-panel="builtin">
                            <div class="form-field">
                                <label class="field-label" for="builtinText">输入文本</label>
                                <textarea class="field-textarea" id="builtinText" placeholder="请输入要转换为语音的文本..."></textarea>
                            </div>

                            <div class="form-row">
                                <div class="form-field">
                                    <label class="field-label" for="builtinVoice">选择音色</label>
                                    <select class="field-select" id="builtinVoice">
                                        <option value="冰糖">冰糖</option>
                                        <option value="茉莉">茉莉</option>
                                        <option value="苏打">苏打</option>
                                        <option value="白桦">白桦</option>
                                        <option value="Mia">Mia</option>
                                        <option value="Chloe">Chloe</option>
                                        <option value="Milo">Milo</option>
                                        <option value="Dean">Dean</option>
                                    </select>
                                </div>
                                <div class="form-field">
                                    <label class="field-label" for="builtinStyle">风格描述（可选）</label>
                                    <input class="field-input" type="text" id="builtinStyle" placeholder="如：开心、悲伤、东北话...">
                                </div>
                            </div>

                            <div class="style-tags" id="builtinStyleTags">
                                <span class="style-tag" data-style="开心">开心</span>
                                <span class="style-tag" data-style="悲伤">悲伤</span>
                                <span class="style-tag" data-style="东北话">东北话</span>
                                <span class="style-tag" data-style="粤语">粤语</span>
                                <span class="style-tag" data-style="唱歌">唱歌</span>
                                <span class="style-tag" data-style="悄悄话">悄悄话</span>
                                <span class="style-tag" data-style="变快">变快</span>
                                <span class="style-tag" data-style="变慢">变慢</span>
                            </div>

                            <div class="tts-examples">
                                <span class="examples-eyebrow">示例文本</span>
                                <div class="example-list" id="builtinExamples"></div>
                            </div>
                        </div>

                        <!-- Voice design -->
                        <div class="tts-panel" data-tts-panel="design">
                            <div class="form-field">
                                <label class="field-label" for="designDescription">声音描述</label>
                                <textarea class="field-textarea" id="designDescription" placeholder="请描述你想要的声音特征，如：温柔的年轻女性声音，带有轻微的南方口音..."></textarea>
                            </div>
                            <div class="form-field">
                                <label class="field-label" for="designText">要合成的文本</label>
                                <textarea class="field-textarea" id="designText" placeholder="请输入要转换为语音的文本..."></textarea>
                                <span class="char-count"><span id="designCharCount">0</span> 字符</span>
                            </div>
                            <div class="tts-examples">
                                <span class="examples-eyebrow">示例描述</span>
                                <div class="example-list" id="designExamples"></div>
                            </div>
                        </div>

                        <!-- Voice clone -->
                        <div class="tts-panel" data-tts-panel="clone">
                            <div class="form-field">
                                <label class="field-label">上传音频样本</label>
                                <div class="upload-area" id="cloneUpload">
                                    <input type="file" id="cloneFile" accept=".mp3,.wav,audio/mpeg,audio/wav" hidden>
                                    <div class="upload-icon">↑</div>
                                    <div class="upload-text">点击或拖拽上传音频文件</div>
                                    <div class="upload-hint">支持 MP3 / WAV，最大 10MB</div>
                                </div>
                                <div class="file-preview" id="cloneFilePreview">
                                    <span class="file-preview-icon">♪</span>
                                    <div class="file-preview-info">
                                        <div class="file-preview-name" id="cloneFileName"></div>
                                        <div class="file-preview-size" id="cloneFileSize"></div>
                                    </div>
                                    <button class="file-preview-remove" id="cloneFileRemove" type="button" aria-label="删除">✕</button>
                                </div>
                            </div>
                            <div class="form-field">
                                <label class="field-label" for="cloneStyle">风格指导（可选）</label>
                                <input class="field-input" type="text" id="cloneStyle" placeholder="如：带有情感地朗读...">
                            </div>
                            <div class="form-field">
                                <label class="field-label" for="cloneText">要合成的文本</label>
                                <textarea class="field-textarea" id="cloneText" placeholder="请输入要转换为语音的文本..."></textarea>
                                <span class="char-count"><span id="cloneCharCount">0</span> 字符</span>
                            </div>
                        </div>
                    </div>

                    <div class="tts-action">
                        <button class="primary-btn" id="ttsGenerateBtn" type="button">生成语音</button>
                        <div class="tts-status" id="ttsStatus"></div>
                    </div>

                    <div class="tts-audio" id="ttsAudioPlayer">
                        <audio id="ttsAudioEl" controls></audio>
                        <button class="ghost-btn" id="ttsDownloadBtn" type="button">下载 WAV</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ===== Model Picker Modal ===== -->
    <div class="modal-overlay" id="modelModal" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modelModalTitle">
            <header class="modal-header">
                <h2 class="modal-title" id="modelModalTitle">选择模型</h2>
                <button class="modal-close" id="modelModalClose" type="button" aria-label="关闭">✕</button>
            </header>

            <div class="modal-body">
                <div class="modal-pane modal-pane-vendors">
                    <span class="pane-eyebrow">VENDOR</span>
                    <ul class="vendor-list" id="vendorList"></ul>
                </div>
                <div class="modal-pane modal-pane-models">
                    <span class="pane-eyebrow">MODEL</span>
                    <ul class="model-list" id="modelList"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 第三方依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script src="user-button.js"></script>
    <script src="chat.js"></script>
    <script src="tts.js"></script>
    <script src="opilot.js"></script>
    <script src="app.js"></script>
</body>
</html>
